name: Build and Deploy Wasm API

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Wasm
        run: wasm-pack build --target web --release

      - name: Prepare Worker
        run: |
          mkdir -p src
          if [ -f "pkg/optimizer_bg.wasm" ]; then
            cp pkg/optimizer_bg.wasm src/optimizer_bg.wasm
            cp pkg/optimizer.js src/optimizer_wasm.js
            echo "✅ Wasm files copied to src/"
          else
            echo "❌ Wasm build artifacts not found in pkg/"
            exit 1
          fi
          ls -l src/

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
